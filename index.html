<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Father's Day Lee!</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;

    /* Aston Martin background */
    background-image: url("https://images.unsplash.com/photo-1544636331-e26879cd4d9");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: rgba(0,0,0,0.65);
    padding: 40px;
    border-radius: 20px;
    max-width: 700px;
}

h1 {
    font-size: 50px;
    color: #00ff99;
}

p {
    font-size: 24px;
    line-height: 1.6;
}

button {
    background: #00ff99;
    border: none;
    padding: 15px 30px;
    font-size: 18px;
    border-radius: 30px;
    cursor: pointer;
}

button:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<div class="container">
    <h1>Happy Father's Day Lee! 💚</h1>

    <p>
        To my amazing stepdad,<br><br>
        Thank you for always being there, helping me,
        supporting me, and making life better.
        You're appreciated more than words can say.
    </p>

    <button onclick="showMessage()">
        Click Me
    </button>
</div>

<script>
function showMessage() {
    alert("Lee, you're an awesome stepdad. Happy Father's Day! 🚗💚");
}
</script>

</body>
</html>
